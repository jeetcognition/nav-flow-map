name: Validate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: python3 -m json.tool navmap-edits.json > /dev/null
      - run: node scripts/validate-data.js
      - run: npm run catalog:validate
